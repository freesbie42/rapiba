# Rapiba - Raspberry Pi Automated Backup
# Konfigurationsdatei
# =====================================================

[rapiba]

# BACKUP QUELLENVERZEICHNISSE
# ⚠️ DEPRECATED! Diese Einstellung wird ignoriert.
# Stattdessen werden ALLE angesteckten Speichergeräte automatisch erkannt!
# 
# Das System erkennt automatisch:
#  - USB-Sticks (egal wo gemountet: /media, /mnt, /run/media, etc.)
#  - SD-Karten
#  - Externe Festplatten
#  - Andere tragbare Speichermedien
#
# Die einzige Ausnahme: Das BACKUP_TARGET wird automatisch ausgeschlossen
# um Backup-zu-Backup zu vermeiden.
#
# Falls Sie alte Konfigurationen haben, werden diese IGNORIERT:
# BACKUP_SOURCES=/media/usb,/media/sdcard  (← wird nicht mehr verwendet)

# BACKUP ZIELVERZEICHNIS
# Basispfad für Backups (muss auf dem Raspberry Pi existieren)
BACKUP_TARGET=/backup

# BACKUP PFAD FORMAT
# Optionen:
#   datetime     - Format: YYYY-MM-DD_HH-MM-SS
#   number       - Laufende Nummer: backup_1, backup_2, etc.
#   both         - Kombiniert: backup_1_2025-11-14_10-30-45
#   custom       - Eigenes Format mit Variablen (siehe unten)
BACKUP_PATH_FORMAT=both

# CUSTOM PFAD FORMAT (nur wenn BACKUP_PATH_FORMAT=custom)
# Verfügbare Variablen:
#   {datetime}   - YYYY-MM-DD_HH-MM-SS
#   {date}       - YYYY-MM-DD
#   {time}       - HH-MM-SS
#   {number}     - Laufende Nummer
#   {source}     - Name der Quelle (z.B. 'usb', 'sdcard')
# Beispiel: {date}_backup_{number}  oder  {source}_{datetime}
CUSTOM_PATH_FORMAT=

# DUPLIKAT-VERMEIDUNG
# Methode zur Erkennung bereits kopierter Dateien:
#   md5          - MD5-Checksummen vergleichen (schnell, weniger sicher)
#   sha256       - SHA256-Checksummen vergleichen (sicherer, langsamer)
#   size_time    - Dateigröße und Änderungszeit vergleichen (schnellste)
#   none         - Keine Duplikat-Vermeidung (überschreibt alles)
DUPLICATE_CHECK_METHOD=sha256

# DATEIINDEX-DATENBANK
# Pfad zur Datenbank mit bereits kopierten Dateien
# (wird automatisch erstellt)
DUPLICATE_DB_PATH=/var/lib/rapiba/duplicate_db.sqlite3

# LOGGING
# Pfad für Log-Dateien
LOG_DIR=/var/log/rapiba
LOG_LEVEL=INFO

# USB/SD-CARD ERKENNUNG
# Automatische Erkennung von allen angesteckten Speichergeräten
# Das System scannt regelmäßig /proc/mounts und erkennt neue Geräte
#
# Wichtig: Das BACKUP_TARGET wird automatisch ausgeschlossen!
# Dies verhindert Probleme wenn das Backup-Ziel selbst ein USB-Stick ist.

# Intervall zwischen Device-Checks (in Sekunden)
DEVICE_CHECK_INTERVAL=5

# Automatische Erkennung aktiviert (empfohlen: yes)
AUTO_DETECT_DEVICES=yes

# FORTGESCHRITTENE OPTIONEN
# Anzahl der Kopier-Prozesse parallel (für Multi-Core)
PARALLEL_JOBS=2

# Kompression von Backups (optional)
COMPRESS_BACKUPS=no
COMPRESSION_LEVEL=6

# Sicherungsbestätigung nach erfolgreichem Backup
VERIFY_CHECKSUMS=yes

# Benachrichtigungen (E-Mail oder andere)
ENABLE_NOTIFICATIONS=no
NOTIFICATION_SCRIPT=/usr/local/bin/rapiba_notify.sh

# SPEICHERPLATZ-MANAGEMENT
# Automatisches Löschen alter Backups (0 = deaktiviert)
DELETE_OLD_BACKUPS_DAYS=0

# Maximale Anzahl der Backups pro Quelle
MAX_BACKUPS_PER_SOURCE=0

# SICHERHEIT
# Dateiberechtigungen für neue Backup-Verzeichnisse
BACKUP_DIR_MODE=755
BACKUP_FILE_MODE=644

# Besitzer der Backups (normalerweise root)
BACKUP_OWNER=root:root

# Dry-Run Modus (simuliert Backup ohne tatsächliches Kopieren)
DRY_RUN=no
