# Rapiba Beispiel-Konfigurationen
# Speichern unter /etc/rapiba/rapiba.conf

# ============================================
# BEISPIEL 1: Standard-Backup (empfohlen)
# ============================================
# [DEFAULT]
# BACKUP_SOURCES=/media/usb,/media/sdcard
# BACKUP_TARGET=/backup
# BACKUP_PATH_FORMAT=both
# DUPLICATE_CHECK_METHOD=sha256
# PARALLEL_JOBS=2
# AUTO_DETECT_DEVICES=yes
# DRY_RUN=no

# ============================================
# BEISPIEL 2: Schnelles Backup
# ============================================
# [DEFAULT]
# BACKUP_SOURCES=/media/usb
# BACKUP_TARGET=/backup/fast
# BACKUP_PATH_FORMAT=number
# DUPLICATE_CHECK_METHOD=size_time
# PARALLEL_JOBS=4
# DRY_RUN=no

# ============================================
# BEISPIEL 3: Sicheres Backup mit Archivierung
# ============================================
# [DEFAULT]
# BACKUP_SOURCES=/media/external_drive
# BACKUP_TARGET=/backup/secure
# BACKUP_PATH_FORMAT=custom
# CUSTOM_PATH_FORMAT={date}_backup_{number}_{source}
# DUPLICATE_CHECK_METHOD=sha256
# VERIFY_CHECKSUMS=yes
# PARALLEL_JOBS=1
# DELETE_OLD_BACKUPS_DAYS=90
# MAX_BACKUPS_PER_SOURCE=20

# ============================================
# BEISPIEL 4: Automatische Cleanup
# ============================================
# [DEFAULT]
# BACKUP_SOURCES=/media/usb,/media/sdcard,/media/external
# BACKUP_TARGET=/mnt/nfs/backups
# BACKUP_PATH_FORMAT=both
# DUPLICATE_CHECK_METHOD=sha256
# DELETE_OLD_BACKUPS_DAYS=30
# MAX_BACKUPS_PER_SOURCE=10
# PARALLEL_JOBS=2

# ============================================
# BEISPIEL 5: Multiple Quellen mit Namen
# ============================================
# [DEFAULT]
# BACKUP_SOURCES=/media/usb,/media/sdcard
# BACKUP_TARGET=/backup
# BACKUP_PATH_FORMAT=custom
# CUSTOM_PATH_FORMAT={source}/{date}_backup
# DUPLICATE_CHECK_METHOD=sha256
# PARALLEL_JOBS=3
#
# Dies erzeugt:
#   /backup/usb/2025-11-14_backup/
#   /backup/sdcard/2025-11-14_backup/
